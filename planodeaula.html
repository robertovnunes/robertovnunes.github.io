<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Aula - Escola Deus é Fiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        /* --- CONFIGURAÇÕES DE MARGEM DA FOLHA (IMPRESSORA) --- */
        @page {
            margin-top: 1.5cm;
            margin-bottom: 1.5cm;
            margin-left: 0;
            margin-right: 0;
        }

        @page :first {
            margin-top: 0; 
        }

        @media print {
            .no-print { display: none !important; }
            
            body { 
                background-color: white !important; 
                padding: 1.5cm 1.5cm 0 1.5cm !important; 
            }
            
            .print-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .section-card { border: 1px solid #e2e8f0 !important; }
            
            textarea, input, select { 
                border: none !important; 
                resize: none !important; 
                background: transparent !important;
                -webkit-appearance: none;
                appearance: none;
                box-shadow: none !important;
                outline: none !important;
            }

            .bg-slate-50\/50, .bg-blue-50, .bg-slate-50 {
                background-color: transparent !important;
            }

            /* --- ESTILIZAÇÃO DA LISTA PARA IMPRESSÃO --- */
            #listaRecursos {
                padding-left: 1.5rem !important;
                margin-top: 0.5rem !important;
            }
            #listaRecursos li {
                border: none !important;
                padding: 0 !important;
                margin-bottom: 0.25rem !important;
                display: list-item !important; /* Transforma em bullet points */
                list-style-type: disc !important;
                background: transparent !important;
            }

            /* --- CORREÇÕES DE QUEBRA DE PÁGINA --- */
            section, .group, textarea, ul {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            h1, h2, h3, h4, label {
                page-break-after: avoid !important;
                break-after: avoid !important;
            }
        }

        .tech-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-6 px-4">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8 no-print">
            <div class="inline-flex items-center justify-center p-4 bg-white rounded-2xl shadow-sm border border-slate-200 mb-4">
                <div class="p-2 bg-blue-600 rounded-lg mr-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-800">Escola Deus é Fiel</h1>
            </div>
            <p class="text-slate-500 font-medium">Sistema de Planejamento de Robótica & Informática</p>
        </header>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden print-container">
            <div class="tech-gradient p-8 text-white">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="text-3xl font-black uppercase tracking-tight">Plano de Aula</h2>
                        <p class="text-blue-100 opacity-90 text-lg font-semibold">Escola Deus é Fiel</p>
                    </div>
                    <div class="text-right hidden md:block">
                        <div class="bg-white/10 backdrop-blur-md p-3 rounded-xl border border-white/20">
                            <span class="block text-xs uppercase font-bold text-blue-200">Ano Letivo</span>
                            <span class="text-xl font-bold">2026</span>
                        </div>
                    </div>
                </div>
            </div>

            <form id="lessonPlanForm" class="p-8 space-y-8">
                
                <section class="section-card p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Componente</label>
                            <select class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 font-bold text-blue-700 bg-white outline-none">
                                <option>Robótica</option>
                                <option>Informática</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Professor(a)</label>
                            <input type="text" placeholder="Nome do docente" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Turma</label>
                                <input type="text" placeholder="Ex: 4º Ano" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>
                                <input type="date" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-blue-600 no-print" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        Tema da Aula / Projeto
                    </label>
                    <input type="text" placeholder="Ex: Construção de Protótipo com Alavancas ou Introdução ao Editor de Texto" class="w-full px-5 py-3 rounded-2xl border-2 border-slate-200 focus:border-blue-500 focus:ring-0 text-lg font-semibold text-slate-800 outline-none transition-all">
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <section>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Objetivos Pedagógicos</label>
                        <textarea rows="4" placeholder="O que os alunos irão desenvolver hoje?" class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50/50"></textarea>
                    </section>
                    
                    <section>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Recursos Necessários</label>
                        
                        <div class="flex gap-2 mb-3 no-print">
                            <input type="text" id="inputRecurso" placeholder="Ex: Kit LEGO, Tablets..." class="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50/50">
                            <button type="button" onclick="adicionarRecurso()" class="px-4 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors shadow-sm font-bold">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                        </div>
                        
                        <ul id="listaRecursos" class="space-y-2 text-slate-700">
                            </ul>
                    </section>
                </div>

                <section class="space-y-4">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center">
                        <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center mr-3 text-sm no-print">M</span>
                        Roteiro de Atividades
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="group">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-1 tracking-widest">Etapa 1: Contextualização & Desafio</label>
                            <textarea rows="2" placeholder="Introdução teórica ou apresentação do problema..." class="w-full px-4 py-3 rounded-xl border border-slate-200 group-hover:border-blue-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                        </div>
                        
                        <div class="group">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-1 tracking-widest">Etapa 2: Mão na Massa (Prática)</label>
                            <textarea rows="5" placeholder="Passo a passo da construção ou atividade no computador..." class="w-full px-4 py-3 rounded-xl border border-slate-200 group-hover:border-blue-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                        </div>

                        <div class="group">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-1 tracking-widest">Etapa 3: Compartilhamento & Organização</label>
                            <textarea rows="2" placeholder="Demonstração dos projetos e organização do laboratório..." class="w-full px-4 py-3 rounded-xl border border-slate-200 group-hover:border-blue-300 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                        </div>
                    </div>
                </section>

                <section class="p-6 bg-blue-50 rounded-2xl border border-blue-100 section-card">
                    <label class="block text-sm font-bold text-blue-800 mb-2">Critérios de Avaliação e Observações</label>
                    <textarea rows="3" placeholder="Como será verificado o aprendizado? Algum aluno precisou de apoio extra?" class="w-full px-4 py-3 rounded-xl border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none bg-white"></textarea>
                </section>

                <div class="pt-8 border-t border-slate-200 flex flex-wrap gap-4 justify-between no-print">
                    <button type="button" onclick="clearForm()" class="px-6 py-3 text-slate-500 font-bold hover:text-red-500 transition-colors uppercase text-xs tracking-widest">
                        Resetar Tudo
                    </button>
                    <div class="flex gap-3">
                        <button type="button" onclick="window.print()" class="px-10 py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl hover:bg-black active:scale-95 transition-all flex items-center uppercase text-sm tracking-tighter">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            Finalizar e Imprimir
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <footer class="mt-8 text-center text-slate-400 text-xs no-print uppercase tracking-widest">
            &copy; 2026 Escola Deus é Fiel • Planejamento Pedagógico
        </footer>
    </div>

    <script>
        const inputRecurso = document.getElementById('inputRecurso');
        const listaRecursos = document.getElementById('listaRecursos');

        // Função para adicionar item na lista
        function adicionarRecurso() {
            const valor = inputRecurso.value.trim();
            if (valor === '') return; // Não adiciona se estiver vazio

            // Cria o elemento da lista (li)
            const li = document.createElement('li');
            li.className = 'flex justify-between items-center bg-white px-3 py-2 border border-slate-200 rounded-lg shadow-sm';
            
            // Cria o texto do recurso
            const span = document.createElement('span');
            span.className = 'font-medium';
            span.textContent = valor;

            // Cria o botão de remover (X)
            const btnRemover = document.createElement('button');
            btnRemover.type = 'button';
            btnRemover.className = 'text-slate-400 hover:text-red-500 transition-colors no-print p-1';
            btnRemover.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>';
            
            // Ação de remover o item
            btnRemover.onclick = function() {
                li.remove();
            };

            // Junta tudo e joga na tela
            li.appendChild(span);
            li.appendChild(btnRemover);
            listaRecursos.appendChild(li);

            // Limpa o campo para digitar o próximo
            inputRecurso.value = '';
            inputRecurso.focus();
        }

        // Permite adicionar o item apertando a tecla "Enter"
        inputRecurso.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Evita que a página seja recarregada ao dar enter
                adicionarRecurso();
            }
        });

        // Modificado para apagar também a lista de recursos
        function clearForm() {
            if (confirm("Deseja apagar todos os dados digitados neste plano?")) {
                document.getElementById('lessonPlanForm').reset();
                document.getElementById('listaRecursos').innerHTML = ''; // Limpa os itens criados
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
