<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Aula - Escola Deus é Fiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }

        /* --- CONFIGURAÇÕES DE MARGEM DA FOLHA (IMPRESSORA) --- */
        @page {
            margin-top: 1.5cm;
            margin-bottom: 1.5cm;
            margin-left: 0;
            margin-right: 0;
        }

        @page :first {
            margin-top: 0; 
        }

        @media print {
            .no-print { display: none !important; }
            
            body { 
                background-color: white !important; 
                padding: 1.5cm 1.5cm 0 1.5cm !important; 
            }
            
            .print-container { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .section-card { border: 1px solid #e2e8f0 !important; }
            
            textarea, input, select { 
                border: none !important; 
                resize: none !important; 
                background: transparent !important;
                -webkit-appearance: none;
                appearance: none;
                box-shadow: none !important;
                outline: none !important;
            }

            .bg-slate-50\/50, .bg-blue-50, .bg-slate-50 {
                background-color: transparent !important;
            }

            /* --- ESTILIZAÇÃO DA LISTA PARA IMPRESSÃO --- */
            #listaRecursos {
                padding-left: 1.5rem !important;
                margin-top: 0.5rem !important;
            }
            #listaRecursos li {
                border: none !important;
                padding: 0 !important;
                margin-bottom: 0.25rem !important;
                display: list-item !important; /* Transforma em bullet points */
                list-style-type: disc !important;
                background: transparent !important;
            }

            /* --- CORREÇÕES DE QUEBRA DE PÁGINA --- */
            section, .group, textarea, ul {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            h1, h2, h3, h4, label {
                page-break-after: avoid !important;
                break-after: avoid !important;
            }
        }

        .tech-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-6 px-4">

                            <span class="text-xl font-bold">2026</span>
                        </div>
                    </div>
                </div>
            </div>

                        </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>

                        </div>
                    </div>
