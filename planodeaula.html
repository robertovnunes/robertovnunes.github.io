<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Aula - Escola Deus é Fiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
        }

        /* Esconde elementos que não devem ir para o PDF durante a geração */
        .pdf-generating .no-print {
            display: none !important;
        }
        
        .pdf-generating {
            background-color: white !important;
            padding: 0 !important;
        }

        .pdf-generating .print-container {
            box-shadow: none !important;
            border: none !important;
        }

        .pdf-generating textarea, .pdf-generating input, .pdf-generating select {
            border: none !important;
            background: transparent !important;
            resize: none !important;
            appearance: none; /* Remove setas do select no PDF */
            -webkit-appearance: none;
        }

        .tech-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-6 px-4" id="body-container">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8 no-print">
            <div class="inline-flex items-center justify-center p-4 bg-white rounded-2xl shadow-sm border border-slate-200 mb-4">
                <div class="p-2 bg-blue-600 rounded-lg mr-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-800">Escola Deus é Fiel</h1>
            </div>
            <p class="text-slate-500 font-medium">Sistema de Planejamento de Robótica & Informática</p>
        </header>

        <div id="documento-pdf" class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden print-container">
            <div class="tech-gradient p-8 text-white">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="text-3xl font-black uppercase tracking-tight">Plano de Aula</h2>
                        <p class="text-blue-100 opacity-90 text-lg font-semibold">Escola Deus é Fiel</p>
                    </div>
                    <div class="text-right hidden md:block">
                        <div class="bg-white/10 backdrop-blur-md p-3 rounded-xl border border-white/20">
                            <span class="block text-xs uppercase font-bold text-blue-200">Ano Letivo</span>
                            <span class="text-xl font-bold" id="currentYearDisplay">2026</span>
                        </div>
                    </div>
                </div>
            </div>

            <form id="lessonPlanForm" class="p-8 space-y-8">
                
                <section class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Componente</label>
                            <select name="componente" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 font-bold text-blue-700 bg-white outline-none">
                                <option value="Robótica">Robótica</option>
                                <option value="Informática">Informática</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Professor(a)</label>
                            <input type="text" name="professor" placeholder="Nome do docente" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Turma</label>
                                <input type="text" name="turma" placeholder="Ex: 4º Ano" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Data</label>
                                <input type="date" name="data" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 bg-white outline-none">
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        Tema da Aula / Projeto
                    </label>
                    <input type="text" name="tema" placeholder="Ex: Construção de Protótipo com Alavancas..." class="w-full px-5 py-3 rounded-2xl border-2 border-slate-200 focus:border-blue-500 focus:ring-0 text-lg font-semibold text-slate-800 outline-none transition-all">
                </section>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <section>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Objetivos Pedagógicos</label>
                        <textarea name="objetivos" rows="4" placeholder="O que os alunos irão desenvolver hoje?" class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50/50"></textarea>
                    </section>
                    <section>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Recursos Necessários</label>
                        <textarea name="recursos" rows="4" placeholder="Ex: Kit LEGO, Tablets, Componentes..." class="w-full px-4 py-3 rounded-2xl border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50/50"></textarea>
                    </section>
                </div>

                <section class="space-y-4">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center">
                        <span class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center mr-3 text-sm">M</span>
                        Roteiro de Atividades
                    </h3>
                    
                    <div class="space-y-4">
                        <div class="group">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-1 tracking-widest">Etapa 1: Contextualização & Desafio</label>
                            <textarea name="etapa_contexto" rows="2" placeholder="Introdução teórica ou apresentação do problema..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                        </div>
                        
                        <div class="group">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-1 tracking-widest">Etapa 2: Mão na Massa (Prática)</label>
                            <textarea name="etapa_pratica" rows="5" placeholder="Passo a passo da construção ou atividade..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                        </div>

                        <div class="group">
                            <label class="block text-xs font-black text-blue-600 uppercase mb-1 tracking-widest">Etapa 3: Compartilhamento & Organização</label>
                            <textarea name="etapa_compartilhamento" rows="2" placeholder="Demonstração dos projetos e organização..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                        </div>
                    </div>
                </section>

                <section class="p-6 bg-blue-50 rounded-2xl border border-blue-100">
                    <label class="block text-sm font-bold text-blue-800 mb-2">Critérios de Avaliação e Observações</label>
                    <textarea name="avaliacao" rows="3" placeholder="Como será verificado o aprendizado?" class="w-full px-4 py-3 rounded-xl border border-blue-200 focus:ring-2 focus:ring-blue-400 outline-none bg-white resize-none"></textarea>
                </section>

                <div class="pt-8 border-t border-slate-200 flex flex-wrap gap-4 justify-between no-print" id="action-buttons">
                    <button type="button" id="btnReset" class="px-6 py-3 text-slate-500 font-bold hover:text-red-500 transition-colors uppercase text-xs tracking-widest">
                        Resetar Tudo
                    </button>
                    <div class="flex gap-3">
                        <button type="button" id="btnExportPDF" class="px-10 py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl hover:bg-black active:scale-95 transition-all flex items-center uppercase text-sm tracking-tighter">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            Baixar PDF
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <footer class="mt-8 text-center text-slate-400 text-xs no-print uppercase tracking-widest">
            &copy; <span id="footerYear"></span> Escola Deus é Fiel • Planejamento Pedagógico
        </footer>
    </div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel" data-presets="typescript">
        // Declarando a lib global para o TypeScript não reclamar
        declare var html2pdf: any;

        interface LessonPlanData {
            [key: string]: string;
        }

        interface IStorageService {
            save(key: string, data: any): void;
            load<T>(key: string): T | null;
            clear(key: string): void;
        }

        class LocalStorageService implements IStorageService {
            public save(key: string, data: any): void {
                try { localStorage.setItem(key, JSON.stringify(data)); } 
                catch (error) { console.error('Erro ao salvar:', error); }
            }

            public load<T>(key: string): T | null {
                try {
                    const data = localStorage.getItem(key);
                    return data ? (JSON.parse(data) as T) : null;
                } catch (error) { return null; }
            }

            public clear(key: string): void {
                localStorage.removeItem(key);
            }
        }

        class LessonPlanApp {
            private readonly form: HTMLFormElement | null;
            private readonly btnReset: HTMLButtonElement | null;
            private readonly btnExportPDF: HTMLButtonElement | null;
            private readonly inputs: NodeListOf<HTMLInputElement | HTMLTextAreaElement | HTMLSelectElement>;
            
            constructor(
                private readonly formId: string,
                private readonly storageKey: string,
                private readonly storageService: IStorageService
            ) {
                this.form = document.getElementById(this.formId) as HTMLFormElement | null;
                this.btnReset = document.getElementById('btnReset') as HTMLButtonElement | null;
                this.btnExportPDF = document.getElementById('btnExportPDF') as HTMLButtonElement | null;
                this.inputs = document.querySelectorAll(`#${this.formId} input, #${this.formId} textarea, #${this.formId} select`);
                
                if (this.form) {
                    this.bindEvents();
                    this.initializeUI();
                    this.loadDraftData();
                }
            }

            private bindEvents(): void {
                this.btnReset?.addEventListener('click', () => this.handleReset());
                this.btnExportPDF?.addEventListener('click', () => this.handleExportPDF());
                this.form?.addEventListener('input', () => this.saveDraftData());
                
                this.inputs.forEach((input: Element) => {
                    if (input.tagName.toLowerCase() === 'textarea') {
                        input.addEventListener('input', this.autoResizeTextarea.bind(this));
                    }
                });
            }

            private initializeUI(): void {
                const currentYear = new Date().getFullYear().toString();
                const displays = [document.getElementById('currentYearDisplay'), document.getElementById('footerYear')];
                displays.forEach(el => { if (el) el.textContent = currentYear; });
            }

            private handleReset(): void {
                if (window.confirm("Deseja apagar todos os dados digitados neste plano?")) {
                    this.form?.reset();
                    this.storageService.clear(this.storageKey);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    this.inputs.forEach(input => {
                        if (input.tagName.toLowerCase() === 'textarea') {
                            (input as HTMLTextAreaElement).style.height = 'auto';
                        }
                    });
                }
            }

            private async handleExportPDF(): Promise<void> {
                const elementoParaPDF = document.getElementById('documento-pdf');
                const bodyContainer = document.getElementById('body-container');
                const btnOriginalText = this.btnExportPDF!.innerHTML;
                
                if (!elementoParaPDF) return;

                // Feedback visual de carregamento
                if (this.btnExportPDF) {
                    this.btnExportPDF.innerHTML = 'Gerando Arquivo...';
                    this.btnExportPDF.disabled = true;
                }

                // Adiciona classe para remover estilos que atrapalham o PDF (como bordas de input)
                bodyContainer?.classList.add('pdf-generating');

                // Pega o nome da turma e data para compor o nome do arquivo, se existirem
                const turma = (document.querySelector('input[name="turma"]') as HTMLInputElement)?.value || 'Turma';
                const data = (document.querySelector('input[name="data"]') as HTMLInputElement)?.value || 'Data';
                const fileName = `Plano_Aula_${turma}_${data}.pdf`.replace(/[^a-z0-9_.-]/gi, '_');

                const opcoesConfiguracao = {
                    margin:       [10, 10, 10, 10], // Margens [top, left, bottom, right] em mm
                    filename:     fileName,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true, windowWidth: 1024 }, // scale 2 melhora a resolução
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                try {
                    // Executa a conversão da lib
                    await html2pdf().set(opcoesConfiguracao).from(elementoParaPDF).save();
                } catch (error) {
                    console.error('Erro ao gerar PDF:', error);
                    alert('Houve um erro ao gerar o PDF. Tente novamente.');
                } finally {
                    // Remove estado de carregamento e restaura a tela original
                    bodyContainer?.classList.remove('pdf-generating');
                    if (this.btnExportPDF) {
                        this.btnExportPDF.innerHTML = btnOriginalText;
                        this.btnExportPDF.disabled = false;
                    }
                }
            }

            private autoResizeTextarea(event: Event): void {
                const element = event.target as HTMLTextAreaElement;
                element.style.height = 'auto';
                element.style.height = `${element.scrollHeight}px`;
            }

            private saveDraftData(): void {
                const formData: LessonPlanData = {};
                this.inputs.forEach((input: Element) => {
                    const el = input as HTMLInputElement | HTMLTextAreaElement | HTMLSelectElement;
                    if (el.name) formData[el.name] = el.value;
                });
                this.storageService.save(this.storageKey, formData);
            }

            private loadDraftData(): void {
                const savedData = this.storageService.load<LessonPlanData>(this.storageKey);
                if (savedData) {
                    this.inputs.forEach((input: Element) => {
                        const el = input as HTMLInputElement | HTMLTextAreaElement | HTMLSelectElement;
                        if (el.name && savedData[el.name] !== undefined) {
                            el.value = savedData[el.name];
                            if (el.tagName.toLowerCase() === 'textarea' && el.value !== "") {
                                el.dispatchEvent(new Event('input'));
                            }
                        }
                    });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const storage = new LocalStorageService();
            new LessonPlanApp('lessonPlanForm', 'escolaDeusEFiel_formData_ts', storage);
        });
    </script>
</body>
</html>
